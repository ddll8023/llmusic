<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流动光晕背景 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden; height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #08080e; cursor: default;
}
canvas { display: block; position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; }

/* 控件 */
.controls {
  position: fixed; bottom: 40px; left: 50%;
  transform: translateX(-50%); z-index: 20;
  display: flex; gap: 10px; align-items: center;
}
.controls button {
  padding: 8px 20px; border: 1px solid rgba(255,255,255,.06);
  border-radius: 50px; font-size: 13px; cursor: pointer;
  background: rgba(255,255,255,.05); color: rgba(255,255,255,.45);
  backdrop-filter: blur(12px);
  transition: all .3s cubic-bezier(.16,1,.3,1);
  font-family: inherit; letter-spacing: .3px;
}
.controls button:hover { background: rgba(255,255,255,.12); color: #fff; }
.controls button.active { background: rgba(76,175,80,.12); color: rgba(76,175,80,.8); border-color: rgba(76,175,80,.18); }
.controls .badge { color: rgba(255,255,255,.12); font-size: 11px; }

.title {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%); z-index: 5;
  text-align: center; pointer-events: none; user-select: none;
}
.title h1 { font-size: 64px; font-weight: 300; color: rgba(255,255,255,.06); letter-spacing: 16px; }
.title p { font-size: 14px; color: rgba(255,255,255,.08); letter-spacing: 6px; margin-top: 8px; font-weight: 300; }

@media (prefers-reduced-motion: reduce) {
  canvas { display: none; }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="title">
  <h1>✦ LLMUSIC</h1>
  <p>交互光晕 · 随鼠标流动</p>
</div>
<div class="controls">
  <button id="btnPlay" class="active">▶ 播放态</button>
  <span class="badge">鼠标移动触发光晕跟随</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let playing = true;
let mx = .5, my = .5, tx = .5, ty = .5;

// 光晕定义：位置(x,y) + 速度 + 延迟 + 颜色 + 大小
const orbs = [
  { x: .2, y: .2, vx: .3, vy: .7, d: 0,   r: 18, g: 120, b: 255, size: .5, a: .35 },
  { x: .8, y: .7, vx: .5, vy: .2, d: 2,   r: 76, g: 175, b: 80,  size: .45, a: .3 },
  { x: .5, y: .3, vx: .7, vy: .4, d: 4,   r: 110, g: 50, b: 200, size: .4, a: .25 },
  { x: .3, y: .8, vx: .2, vy: .5, d: 6,   r: 30, g: 140, b: 160, size: .35, a: .22 },
  { x: .7, y: .4, vx: .6, vy: .3, d: 8,   r: 200, g: 80, b: 120, size: .3, a: .2 },
  { x: .4, y: .6, vx: .4, vy: .6, d: 1.5, r: 60, g: 180, b: 220, size: .25, a: .18 },
  { x: .6, y: .2, vx: .8, vy: .5, d: 3.5, r: 150, g: 60, b: 180, size: .2, a: .15 },
];

let time = 0;
let lastFrame = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  tx = e.clientX / W;
  ty = e.clientY / H;
});

document.getElementById('btnPlay').addEventListener('click', function() {
  playing = !playing;
  this.textContent = playing ? '▶ 播放态' : '⏸ 空闲态';
  this.classList.toggle('active', playing);
});

const mq = window.matchMedia('(prefers-reduced-motion: reduce)');

function loop(ts) {
  const el = ts - lastFrame;
  if (el < 1000 / 60) { requestAnimationFrame(loop); return; }
  lastFrame = ts;
  time += el / 1000;

  // 鼠标平滑跟随（加速）
  mx += (tx - mx) * .12;
  my += (ty - my) * .12;

  ctx.clearRect(0, 0, W, H);

  // 基底
  const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * .7);
  bg.addColorStop(0, '#0c0c1a');
  bg.addColorStop(1, '#050508');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 绘制光晕
  for (const o of orbs) {
    // 鼠标跟随：大幅提速 + 增强幅度
    const follow = .4 + (1 - o.d / 10) * .3;
    const delay = o.d * 0.08;
    const emx = mx + Math.sin(time * o.vx * 2 + delay) * .08;
    const emy = my + Math.sin(time * o.vy * 2 + delay) * .08;

    // 目标位置
    const idleX = .5 + Math.sin(time * o.vx * .8 + delay) * .3;
    const idleY = .5 + Math.sin(time * o.vy * .8 + delay + 1) * .3;

    const targetX = idleX + (emx - .5) * follow * 2.5;
    const targetY = idleY + (emy - .5) * follow * 2.5;

    // 平滑移动（加速）
    o.x += (targetX - o.x) * .08;
    o.y += (targetY - o.y) * .04;

    const cx = o.x * W;
    const cy = o.y * H;
    const radius = Math.max(W, H) * o.size;

    let intensity = o.a;
    if (playing) intensity *= 1.3;

    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, `rgba(${o.r},${o.g},${o.b},${intensity})`);
    grad.addColorStop(.5, `rgba(${o.r},${o.g},${o.b},${intensity * .35})`);
    grad.addColorStop(1, 'transparent');

    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // hard-light 模拟
  ctx.globalCompositeOperation = 'hard-light';
  for (const o of orbs.slice(0, 4)) {
    const cx = o.x * W;
    const cy = o.y * H;
    const radius = Math.max(W, H) * o.size * 1.2;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, `rgba(${o.r},${o.g},${o.b},${o.a * .5})`);
    grad.addColorStop(.6, `rgba(${o.r},${o.g},${o.b},${o.a * .15})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.globalCompositeOperation = 'source-over';

  // 底部光晕
  const bx = mx * W;
  const glow = ctx.createRadialGradient(bx, H + 30, 0, bx, H + 30, H * .6);
  const ga = playing ? .09 : .035;
  glow.addColorStop(0, `rgba(76,175,80,${ga})`);
  glow.addColorStop(.5, `rgba(18,18,18,${ga * .3})`);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // 暗角
  const vig = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * .15, W / 2, H / 2, Math.max(W, H) * .7);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,.3)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
