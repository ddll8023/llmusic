<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星河粒子系统 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  overflow: hidden;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  cursor: default;
}
canvas {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
}
.title {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  text-align: center;
  pointer-events: none;
  user-select: none;
}
.title h1 {
  font-size: 64px;
  font-weight: 300;
  color: rgba(255,255,255,.06);
  letter-spacing: 16px;
  text-shadow: 0 0 80px rgba(76,175,80,.04);
}
.title p {
  font-size: 14px;
  color: rgba(255,255,255,.08);
  letter-spacing: 6px;
  margin-top: 8px;
  font-weight: 300;
}
.controls {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  padding: 8px 20px;
  border: none;
  border-radius: 50px;
  font-size: 13px;
  cursor: pointer;
  background: rgba(255,255,255,.06);
  color: rgba(255,255,255,.45);
  backdrop-filter: blur(12px);
  transition: all .3s cubic-bezier(.16,1,.3,1);
  font-family: inherit;
  border: 1px solid rgba(255,255,255,.04);
  letter-spacing: .3px;
}
.controls button:hover {
  background: rgba(255,255,255,.12);
  color: #fff;
}
.controls button.active {
  background: rgba(76,175,80,.15);
  color: rgba(76,175,80,.8);
  border-color: rgba(76,175,80,.2);
}
.controls .badge {
  color: rgba(255,255,255,.15);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}
@media (prefers-reduced-motion: reduce) {
  canvas { display: none; }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="title">
  <h1>✦ LLMUSIC</h1>
  <p>沉浸式星河背景 · 技术预览</p>
</div>

<div class="controls">
  <button id="btnPlay" class="active">▶ 播放态</button>
  <button id="btnPause">⏸ 暂停</button>
  <button id="btnMeteor">☄ 流星</button>
  <span class="badge" id="fpsDisplay">-- fps</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
let playing = true;
let paused = false;
let meteorsEnabled = true;
let mouseX = 0.5, mouseY = 0.5;
let targetMX = 0.5, targetMY = 0.5;
let time = 0;
let lastFrame = 0;

// ─── 星云 ───
const nebulaSpots = [
  { x: 0, y: 0, r: 0, g: 0, b: 0, radius: 0, a: 0 }
];

function initNebula() {
  const spots = [
    { rx: .2, ry: .3, r: 70, g: 40, b: 130, a: .025 },
    { rx: .7, ry: .25, r: 25, g: 80, b: 110, a: .02 },
    { rx: .5, ry: .7, r: 100, g: 35, b: 65, a: .015 },
    { rx: .85, ry: .6, r: 40, g: 60, b: 120, a: .018 },
  ];
  spots.forEach((s, i) => {
    nebulaSpots[i] = {
      x: s.rx * W, y: s.ry * H,
      radius: Math.max(W, H) * (.3 + Math.random() * .25),
      r: s.r, g: s.g, b: s.b, a: s.a,
    };
  });
}

function drawNebula() {
  for (const s of nebulaSpots) {
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius);
    grad.addColorStop(0, `rgba(${s.r},${s.g},${s.b},${s.a})`);
    grad.addColorStop(.5, `rgba(${s.r},${s.g},${s.b},${s.a * .3})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── 基础星场 ───
const LAYER_DEFS = [
  { count: 120, minR: .25, maxR: .6, minO: .06, maxO: .2, shadow: 0, speed: .002 },
  { count: 60,  minR: .6, maxR: 1.4, minO: .15, maxO: .45, shadow: 4, speed: .005 },
  { count: 20,  minR: 1.3, maxR: 2.8, minO: .4, maxO: .85, shadow: 12, speed: .01 },
];

const STAR_COLORS = [
  '#ffffff', '#fefefe', '#fefefe',
  '#fff8ee', '#fff5e6',
  '#eaf4ff', '#dceaff', '#cce0ff',
];

let stars = [];

class Star {
  constructor(layerIdx) {
    const L = LAYER_DEFS[layerIdx];
    this.layer = layerIdx;
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.sqrt(Math.random()) * Math.max(W, H) * .7;
    this.cx = Math.cos(angle) * dist;
    this.cy = Math.sin(angle) * dist;
    this.r = L.minR + Math.random() * (L.maxR - L.minR);
    this.bo = L.minO + Math.random() * (L.maxO - L.minO);
    this.color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
    this.spd = L.speed;
    this.shadow = L.shadow;
    // 闪烁
    this.twinkle = .15 + Math.random() * .4;
    this.tSpeed = .3 + Math.random() * 1.2;
    this.tPhase = Math.random() * Math.PI * 2;
    this.isPulsing = Math.random() < .2; // 20% 脉冲星
    this.pulsePhase = Math.random() * Math.PI * 2;
  }

  getPos() {
    const a = time * this.spd + Math.atan2(this.cy, this.cx);
    const d = Math.sqrt(this.cx * this.cx + this.cy * this.cy);
    return { x: Math.cos(a) * d + W / 2, y: Math.sin(a) * d + H / 2 };
  }

  draw() {
    const pos = this.getPos();
    let op = this.bo;
    // 闪烁
    const tw = 1 - this.twinkle + this.twinkle * Math.sin(time * this.tSpeed + this.tPhase);
    op *= (.7 + .3 * tw);

    // 脉冲星 — 光晕脉动
    let glowMult = 1;
    if (this.isPulsing) {
      glowMult = .6 + .4 * Math.sin(time * .8 + this.pulsePhase);
      op *= (.8 + .2 * glowMult);
    }

    if (playing) op *= 1.12;

    // 鼠标视差
    const px = (mouseX - .5) * 8 * (1 - this.spd / .01);
    const py = (mouseY - .5) * 8 * (1 - this.spd / .01);

    ctx.globalAlpha = Math.min(1, Math.max(.005, op));
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = this.shadow > 0 ? this.shadow * glowMult * (this.r / LAYER_DEFS[this.layer].maxR) : 0;
    ctx.beginPath();
    ctx.arc(pos.x + px, pos.y + py, this.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── 流星系统 ───
let meteors = [];
const METEOR_COLORS = [
  { trail: '#2EB9DF', head: '#9E00FF' },
  { trail: '#FF6B6B', head: '#FFD93D' },
  { trail: '#00E5FF', head: '#7C4DFF' },
  { trail: '#FFD700', head: '#FF4500' },
];
let nextMeteorAt = 0;

function spawnMeteor() {
  const palette = METEOR_COLORS[Math.floor(Math.random() * METEOR_COLORS.length)];
  const angle = -Math.PI / 4 + (Math.random() - .5) * .5; // -45° ± 15°
  const speed = 8 + Math.random() * 18;
  const len = 60 + Math.random() * 80;
  const side = Math.random() > .5;
  const startX = side ? Math.random() * W : (Math.random() > .5 ? -len : W + len);
  const startY = side ? -len : Math.random() * H * .6;
  meteors.push({
    x: startX, y: startY,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len: len,
    trail: palette.trail,
    head: palette.head,
    life: 1,
  });
}

function drawMeteors() {
  ctx.shadowBlur = 0;
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.x += m.vx;
    m.y += m.vy;
    m.life -= .008;

    if (m.life <= 0 || m.x > W + 100 || m.x < -100 || m.y > H + 100) {
      meteors.splice(i, 1);
      continue;
    }

    const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.vx * m.len, m.y - m.vy * m.len);
    grad.addColorStop(0, m.head);
    grad.addColorStop(.3, m.trail);
    grad.addColorStop(1, 'transparent');
    ctx.globalAlpha = m.life * .7;
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.2 + m.life * .8;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    // 尾部拖尾
    const tailLen = m.len * (.3 + m.life * .7);
    ctx.lineTo(m.x - m.vx * tailLen, m.y - m.vy * tailLen);
    ctx.stroke();

    // 头部辉光
    ctx.shadowColor = m.head;
    ctx.shadowBlur = 12 * m.life;
    ctx.fillStyle = m.head;
    ctx.globalAlpha = m.life;
    ctx.beginPath();
    ctx.arc(m.x, m.y, 1.5 + m.life * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

// ─── 底部光晕 ───
function drawBottomGlow() {
  const intensity = playing ? .08 : .035;
  const grad = ctx.createRadialGradient(W / 2, H + 40, 0, W / 2, H + 40, H * .55);
  grad.addColorStop(0, `rgba(76,175,80,${intensity})`);
  grad.addColorStop(.5, `rgba(18,18,18,${intensity * .35})`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.shadowBlur = 0;
  ctx.fillRect(0, 0, W, H);
}

// ─── 暗角 ───
function drawVignette() {
  const grad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * .2, W / 2, H / 2, Math.max(W, H) * .75);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,.22)');
  ctx.fillStyle = grad;
  ctx.shadowBlur = 0;
  ctx.fillRect(0, 0, W, H);
}

// ─── 主循环 ───
function init() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  stars = [];
  for (let i = 0; i < LAYER_DEFS.length; i++) {
    for (let j = 0; j < LAYER_DEFS[i].count; j++) {
      stars.push(new Star(i));
    }
  }
  initNebula();
  meteors = [];
  nextMeteorAt = time + 2 + Math.random() * 4;
  document.getElementById('fpsDisplay').textContent = stars.length + ' 星';
}

function loop(ts) {
  const elapsed = ts - lastFrame;
  if (elapsed < 1000 / 30) { requestAnimationFrame(loop); return; }
  lastFrame = ts;
  time += elapsed / 1000;

  // 鼠标平滑
  mouseX += (targetMX - mouseX) * .08;
  mouseY += (targetMY - mouseY) * .08;

  // 背景刷新
  if (!paused) {
    ctx.clearRect(0, 0, W, H);
    ctx.shadowBlur = 0;

    // 1. 背景底色（极微微偏蓝的深色）
    ctx.fillStyle = '#0c0c14';
    ctx.fillRect(0, 0, W, H);

    // 2. 星云
    drawNebula();

    // 3. 基础星场
    for (const s of stars) s.draw();
    ctx.shadowBlur = 0;

    // 4. 流星
    if (meteorsEnabled) {
      if (time >= nextMeteorAt) {
        spawnMeteor();
        if (playing) {
          nextMeteorAt = time + 2 + Math.random() * 3;
        } else {
          nextMeteorAt = time + 4 + Math.random() * 5;
        }
      }
      drawMeteors();
    }

    // 5. 底部光晕
    drawBottomGlow();

    // 6. 暗角
    drawVignette();
  }

  requestAnimationFrame(loop);
}

// ─── 控件 ───
document.getElementById('btnPlay').addEventListener('click', function() {
  playing = !playing;
  this.textContent = playing ? '▶ 播放态' : '⏸ 空闲态';
  this.classList.toggle('active', playing);
});
document.getElementById('btnPause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? '▶ 继续' : '⏸ 暂停';
});
document.getElementById('btnMeteor').addEventListener('click', function() {
  meteorsEnabled = !meteorsEnabled;
  this.textContent = meteorsEnabled ? '☄ 流星' : '☄ 关闭流星';
  this.classList.toggle('active', meteorsEnabled);
});

document.addEventListener('mousemove', e => {
  targetMX = e.clientX / W;
  targetMY = e.clientY / H;
});

const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
if (mq.matches) paused = true;

window.addEventListener('resize', init);
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
