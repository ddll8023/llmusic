<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星河粒子背景 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #121212;
    overflow: hidden;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }
  .controls {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    padding: 10px 24px;
    border: none;
    border-radius: 50px;
    font-size: 14px;
    cursor: pointer;
    background: rgba(255,255,255,.08);
    color: #b3b3b3;
    backdrop-filter: blur(8px);
    transition: all .2s;
    font-family: inherit;
  }
  .controls button:hover {
    background: rgba(255,255,255,.15);
    color: #fff;
  }
  .controls button.active {
    background: rgba(76,175,80,.2);
    color: #4caf50;
  }
  .controls .badge {
    color: #737373;
    font-size: 12px;
  }
  h1 {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    color: rgba(255,255,255,.06);
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 8px;
    user-select: none;
    pointer-events: none;
  }
  @media (prefers-reduced-motion: reduce) {
    canvas { display: none; }
    body::after {
      content: 'prefers-reduced-motion: 粒子动画已暂停';
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: #535353;
      font-size: 13px;
    }
  }
</style>
</head>
<body>
<h1>✦ LLMusic</h1>
<canvas id="particles"></canvas>
<div class="controls">
  <button id="togglePlay" class="active">▶ 播放态</button>
  <button id="toggleMotion">⏸ 暂停动画</button>
  <span class="badge" id="fpsDisplay">30 fps</span>
  <span class="badge" id="countDisplay">80 粒子</span>
</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H;
let particles = [];
const PARTICLE_COUNT = 80;
const MAX_FPS = 30;
let playing = true;
let animating = true;
let lastFrameTime = 0;
let frameCount = 0;
let lastFpsUpdate = 0;
let currentFps = 0;

// 粒子定义
class Particle {
  constructor() {
    this.reset(true);
  }
  reset(init = false) {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.size = 0.5 + Math.random() * 2;
    this.baseOpacity = 0.12 + Math.random() * 0.58;
    this.speedX = (Math.random() - 0.5) * 0.06;
    this.speedY = (Math.random() - 0.5) * 0.06;
    this.phase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = 0.3 + Math.random() * 0.8;
  }
  update(time) {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < -5) this.x = W + 5;
    if (this.x > W + 5) this.x = -5;
    if (this.y < -5) this.y = H + 5;
    if (this.y > H + 5) this.y = -5;
    // 正弦闪烁
    const twinkle = 0.65 + 0.35 * Math.sin(time * this.twinkleSpeed + this.phase);
    let opacity = this.baseOpacity * twinkle;
    // 播放态脉冲增强
    if (playing) {
      const pulse = 1 + 0.2 * Math.sin(time * 1.2);
      opacity *= pulse;
    }
    return opacity;
  }
  draw(opacity) {
    ctx.globalAlpha = Math.min(1, Math.max(0, opacity));
    ctx.fillStyle = '#fff';
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  // 重分布粒子
  particles.forEach(p => {
    p.x = Math.random() * W;
    p.y = Math.random() * H;
  });
}

function init() {
  resize();
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }
}

function loop(timestamp) {
  const elapsed = timestamp - lastFrameTime;
  if (elapsed < 1000 / MAX_FPS) {
    requestAnimationFrame(loop);
    return;
  }
  lastFrameTime = timestamp;

  // FPS 统计
  frameCount++;
  if (timestamp - lastFpsUpdate >= 1000) {
    currentFps = frameCount;
    frameCount = 0;
    lastFpsUpdate = timestamp;
    document.getElementById('fpsDisplay').textContent = currentFps + ' fps';
  }

  if (!animating) {
    requestAnimationFrame(loop);
    return;
  }

  const time = timestamp / 1000;

  // 清空
  ctx.clearRect(0, 0, W, H);

  // 绘制所有粒子
  for (const p of particles) {
    const opacity = p.update(time);
    p.draw(opacity);
  }

  // 绘制底部微光渐变（模拟 album-glow）
  const glowCtx = ctx;
  const glow = glowCtx.createRadialGradient(W / 2, H + 50, 0, W / 2, H + 50, H * 0.45);
  if (playing) {
    glow.addColorStop(0, 'rgba(76,175,80,.08)');
  } else {
    glow.addColorStop(0, 'rgba(76,175,80,.03)');
  }
  glow.addColorStop(0.5, 'rgba(18,18,18,.04)');
  glow.addColorStop(1, 'transparent');
  glowCtx.globalAlpha = 1;
  glowCtx.fillStyle = glow;
  glowCtx.fillRect(0, 0, W, H);

  requestAnimationFrame(loop);
}

// 控件
document.getElementById('togglePlay').addEventListener('click', function() {
  playing = !playing;
  this.textContent = playing ? '▶ 播放态' : '⏸ 暂停态';
  this.classList.toggle('active', playing);
});
document.getElementById('toggleMotion').addEventListener('click', function() {
  animating = !animating;
  this.textContent = animating ? '⏸ 暂停动画' : '▶ 继续动画';
});

// 无障碍
const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
if (motionQuery.matches) {
  animating = false;
  document.getElementById('toggleMotion').textContent = '▶ 继续动画';
}

window.addEventListener('resize', resize);
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
